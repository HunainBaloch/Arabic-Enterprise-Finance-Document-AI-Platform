name: IDP Platform CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Tests
        run: |
          cd backend
          # pytest app/tests/ -v (stubbed until tests are written)

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3
      - name: Clean up old Docker images
        run: |
          docker image prune -af
          docker builder prune -af
      - name: Build Docker Image
        run: |
          docker compose -f docker-compose.prod.yml build
      # Add steps here to configure AWS ECR / Azure Container Registry credentials 
      # and push the built images for the backend, worker, and frontend.
