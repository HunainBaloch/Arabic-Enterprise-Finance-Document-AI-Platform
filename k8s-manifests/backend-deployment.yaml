apiVersion: apps/v1
kind: Deployment
metadata:
  name: idp-backend
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: idp-backend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        env:
        - name: POSTGRES_HOST
          value: "idp-postgres"
        - name: REDIS_HOST
          value: "idp-redis"
        - name: OLLAMA_BASE_URL
          value: "http://host.minikube.internal:11434"
---
apiVersion: v1
kind: Service
metadata:
  name: idp-backend
spec:
  type: LoadBalancer
  selector:
    app: backend
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
